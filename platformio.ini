; https://docs.platformio.org/en/latest/platforms/espressif32.html

[platformio]
boards_dir = ./boards

[env]
build_flags =
    ; to use e.g. as part of the firmware name 
    '-DPIOENV="${PIOENV}"'
 
    ; coding_standards
    -Wno-unused-variable
    -Wno-unused-but-set-variable
    -Wunreachable-code

    ; debug level 5=VERBOSE https://docs.platformio.org/en/latest/platforms/espressif32.html#debug-level
    ;  -DCORE_DEBUG_LEVEL=5
extra_scripts = pre:extra_script.py
framework = arduino
monitor_speed = 115200
; pioarduino platform with latest boards support (T-Display-S3 long, etc.)
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.37/platform-espressif32.zip
; development version of the platformio, to get latest bug fixes and features, but also potential new bugs
; platform = https://github.com/platformio/platform-espressif32.git
; for stable version and does not include latest bug fixes and features
; platform = espressif32
upload_speed = 921600
lib_deps =
  bodmer/TFT_eSPI @ ^2.5.43
  moononournation/GFX Library for Arduino @ ^1.6.5
  mathertel/OneButton @ ^2.6.2
  ; place global libs here, they will be inherited by other envs

; CUSTOM options
; You need manually inject these options into a section
; using ${extra.<name_of_option>} (see below)
[extra]
; https://docs.espressif.com/projects/esp-idf/en/latest/esp32/api-guides/external-ram.html
build_flags_psram =
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue ; https://docs.espressif.com/projects/esp-idf/en/latest/esp32/api-guides/external-ram.html#esp32-rev-v1
lib_deps_builtin =
  SPI
  Wire

[esp32]
build_flags =
    ${env.build_flags}
lib_deps =
    ${env.lib_deps}
    ${extra.lib_deps_builtin}
    ; extend libs only for esp32 based modules here

[esp32s2]
build_flags =
    ${env.build_flags}
lib_deps =
    ${env.lib_deps}
    ${extra.lib_deps_builtin}
    ; extend libs only for esp32s2 based modules here

[esp32s3]
build_flags =
    ${env.build_flags}
lib_deps =
    ${env.lib_deps}
    ${extra.lib_deps_builtin}
    ; extend libs only for esp32s3 based modules here

; **********************
; * ESP32-S2 T-Display *
; **********************

; repository: https://github.com/Xinyuan-LilyGO/LilyGo-T-Display-S2
[env:lilygo-t-display-s2]
extends = esp32s2
board = esp32dev ; what about platformio board support and an own?

; *********************************
; * ESP32-S3 T-Display w/o AMOLED *
; *********************************

; https://docs.platformio.org/en/latest/boards/espressif32/lilygo-t-display-s3.html
; https://www.lilygo.cc/products/t-display-s3
; https://github.com/Xinyuan-LilyGO/T-Display-S3
[env:lilygo-t-display-s3]
board = lilygo-t-display-s3
board_build.partitions = huge_app.csv
build_flags =
    ${esp32s3.build_flags}
lib_deps =
    ${esp32s3.lib_deps}

; LilyGo https://www.lilygo.cc/products/t-display-s3-long
; repo Example: https://github.com/Xinyuan-LilyGO/T-Display-S3-Long
[env:lilygo-t-display-s3-long]
board = lilygo-t-display-s3-long
board_build.partitions = huge_app.csv
build_flags =
    ${esp32s3.build_flags}
lib_deps =
    ${esp32s3.lib_deps}
